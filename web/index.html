<!DOCTYPE html>
<html>
<head>
  <!--
    If you are serving your web app in a path other than the root, change the
    href value below to reflect the base path you are serving from.

    The path provided below has to start and end with a slash "/" in order for
    it to work correctly.

    For more details:
    * https://developer.mozilla.org/en-US/docs/Web/HTML/Element/base

    This is a placeholder for base href that will be replaced by the value of
    the `--base-href` argument provided to `flutter build`.
  -->
  <base href="$FLUTTER_BASE_HREF">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="A new Flutter project.">

  <!-- iOS meta tags & icons -->
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="speech_practice_app">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>speech_practice_app</title>
  <link rel="manifest" href="manifest.json">

  <!-- Microsoft Cognitive Services Speech SDK -->
  <script src="https://cdn.jsdelivr.net/npm/microsoft-cognitiveservices-speech-sdk@latest/distrib/browser/microsoft.cognitiveservices.speech.sdk.bundle-min.js"></script>
  <script>
    window.activeSynthesizers = [];

    window.stopAzureTtsWeb = function() {
      while (window.activeSynthesizers.length > 0) {
        const syn = window.activeSynthesizers.pop();
        try {
          syn.close();
        } catch (e) {
          console.error("Error closing synthesizer: ", e);
        }
      }
    };

    window.playAzureTtsWeb = function(text, key, region, voice, rateMultiplier) {
      window.stopAzureTtsWeb();
      
      return new Promise((resolve, reject) => {
        try {
          if (typeof SpeechSDK === 'undefined') {
            console.error("SpeechSDK is undefined. Make sure the script is loaded.");
            reject("Azure Speech SDK is not loaded.");
            return;
          }
          
          const speechConfig = SpeechSDK.SpeechConfig.fromSubscription(key, region);
          const audioConfig = SpeechSDK.AudioConfig.fromDefaultSpeakerOutput();
          
          const escapedText = text
            .replace(/&/g, '&amp;')
            .replace(/</g, '&lt;')
            .replace(/>/g, '&gt;')
            .replace(/"/g, '&quot;')
            .replace(/'/g, '&apos;');
            
          const ssml = `<speak version='1.0' xml:lang='en-US'>
            <voice xml:lang='en-US' name='${voice}'>
              <prosody rate="${rateMultiplier}">
                ${escapedText}
              </prosody>
            </voice>
          </speak>`;
          
          const synthesizer = new SpeechSDK.SpeechSynthesizer(speechConfig, audioConfig);
          window.activeSynthesizers.push(synthesizer);
          
          synthesizer.speakSsmlAsync(
            ssml,
            result => {
              const index = window.activeSynthesizers.indexOf(synthesizer);
              if (index > -1) {
                window.activeSynthesizers.splice(index, 1);
              }
              synthesizer.close();
              if (result.reason === SpeechSDK.ResultReason.SynthesizingAudioCompleted) {
                resolve(true);
              } else {
                reject("Speech synthesis failed: " + result.errorDetails);
              }
            },
            error => {
              const index = window.activeSynthesizers.indexOf(synthesizer);
              if (index > -1) {
                window.activeSynthesizers.splice(index, 1);
              }
              synthesizer.close();
              reject("Speech synthesis error: " + error);
            }
          );
        } catch (e) {
          reject("Azure Speech SDK error: " + e.toString());
        }
      });
    };
  </script>
</head>
<body>
  <!--
    You can customize the "flutter_bootstrap.js" script.
    This is useful to provide a custom configuration to the Flutter loader
    or to give the user feedback during the initialization process.

    For more details:
    * https://docs.flutter.dev/platform-integration/web/initialization
  -->
  <script src="flutter_bootstrap.js" async></script>
</body>
</html>
