name: my_english_app
description: "입으로 익히는 진짜 영어 — 문장·청크·단어 단위 듣기/발음 연습 앱"
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8

  # 재사용 가능한 핵심 엔진 (순수 Dart: 채점·정렬·피드백·STT/TTS 인터페이스)
  pronunciation_engine:
    path: packages/pronunciation_engine

  # 발음 평가 (STT)
  speech_to_text: ^7.0.0
  # 마이크 권한
  permission_handler: ^11.0.0
  # 듣기 (로컬 TTS 폴백)
  flutter_tts: ^4.0.2
  # Azure Neural TTS 오디오 재생
  audioplayers: ^6.0.0
  # Azure TTS REST 호출
  http: ^1.2.0
  # 진행도/문장 로컬 저장
  shared_preferences: ^2.2.3
  # 관리자: 문장 파일 업로드
  file_picker: ^8.0.0
  # 타이포그래피 (Outfit + 한글)
  google_fonts: ^6.1.0
  # 네비게이션 (리디자인)
  go_router: ^14.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true
